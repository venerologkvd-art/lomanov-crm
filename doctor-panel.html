<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Лікар — Dr. Lomanov</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@300;400;700&display=swap');

:root {
  --bg:#080d14; --s1:#0f1923; --s2:#162030; --bd:#1e3050;
  --ac:#00d4ff; --ac2:#0066ff;
  --gr:#00ff88; --rd:#ff3355; --yl:#ffcc00; --or:#ff8800; --pu:#bb88ff;
  --tx:#ddeeff; --mt:#3a5575; --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;overflow:hidden;}

.app{display:grid;height:100vh;grid-template-rows:44px 36px 1fr;}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--bd);background:var(--s1);}
.logo{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--ac);letter-spacing:.2em;}
.clk{font-size:11px;color:var(--mt);letter-spacing:.08em;margin-left:12px;}
.live{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--gr);letter-spacing:.2em;}
.live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--gr);animation:blink 1.4s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--bd);background:var(--s1);}
.stat{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;border-right:1px solid var(--bd);}
.stat:last-child{border-right:none;}
.sv{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;color:var(--ac);}
.sl{font-size:9px;color:var(--mt);letter-spacing:.1em;text-transform:uppercase;}

/* Main grid */
.main{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:68px 1fr 1fr;gap:8px;padding:8px;overflow:hidden;min-height:0;}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.clabel{font-size:9px;letter-spacing:.28em;color:var(--mt);text-transform:uppercase;padding:6px 10px 5px;border-bottom:1px solid var(--bd);flex-shrink:0;}

/* Nurse (full width row 1) */
.card-nurse{grid-column:1/-1;flex-direction:row;align-items:stretch;}
.nlabel{font-size:9px;letter-spacing:.2em;color:var(--mt);text-transform:uppercase;padding:0 12px;width:130px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;align-items:center;}
.ndisp{flex:1;display:flex;align-items:center;gap:12px;padding:0 16px;transition:background .4s;}
.ni{font-size:28px;flex-shrink:0;}
.nt{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;}
.nsub{font-size:10px;color:var(--mt);margin-top:2px;}
.ntm{margin-left:auto;font-size:10px;color:var(--mt);}

.ns-none{background:rgba(58,85,117,.07);}
.ns-arrived{background:rgba(255,204,0,.09);border-color:var(--yl)!important;}
.ns-nervous{background:rgba(255,51,85,.13);border-color:var(--rd)!important;animation:nflash 1.2s ease infinite;}
.ns-gone{background:rgba(0,255,136,.07);border-color:var(--gr)!important;}
@keyframes nflash{0%,100%{background:rgba(255,51,85,.13)}50%{background:rgba(255,51,85,.26)}}

/* My status (row 2 col 1) */
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:7px;flex:1;}
.sb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 2px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);cursor:pointer;transition:all .17s;font-family:'JetBrains Mono',monospace;color:var(--tx);font-size:9px;letter-spacing:.03em;text-align:center;user-select:none;}
.sb:hover{border-color:var(--ac2);transform:translateY(-1px);}
.sb.active{box-shadow:0 0 14px currentColor;transform:scale(1.04);border-color:currentColor;}
.sb .em{font-size:18px;}
.sb .lb{color:var(--mt);}
.sb.active .lb{color:inherit;}
.sf{color:var(--gr);} .se{color:var(--yl);} .sbu{color:var(--rd);} .sw{color:var(--or);} .sbr{color:var(--pu);}

/* Chat (row 2 col 2) */
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding:7px;min-height:0;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.msg{display:flex;flex-direction:column;gap:2px;max-width:86%;}
.msg.me{align-self:flex-end;align-items:flex-end;}
.msg.her{align-self:flex-start;align-items:flex-start;}
.bbl{padding:5px 9px;border-radius:9px;font-size:12px;line-height:1.4;word-break:break-word;}
.me .bbl{background:linear-gradient(135deg,var(--ac2),var(--ac));color:#fff;border-bottom-right-radius:3px;}
.her .bbl{background:var(--s2);border:1px solid var(--bd);border-bottom-left-radius:3px;}
.mm{font-size:9px;color:var(--mt);padding:0 3px;}

.cq{display:flex;gap:4px;padding:4px 7px;overflow-x:auto;flex-shrink:0;border-top:1px solid var(--bd);}
.cq::-webkit-scrollbar{display:none;}
.qp{flex-shrink:0;padding:3px 8px;border-radius:12px;border:1px solid var(--bd);font-size:10px;cursor:pointer;color:var(--mt);background:var(--s2);white-space:nowrap;font-family:'JetBrains Mono',monospace;transition:all .15s;}
.qp:hover{border-color:var(--ac2);color:var(--tx);}

.crow{display:flex;gap:5px;padding:5px 7px;border-top:1px solid var(--bd);flex-shrink:0;}
.cin{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:6px 9px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.cin:focus{border-color:var(--ac2);}
.cin::placeholder{color:var(--mt);}
.csb{background:linear-gradient(135deg,var(--ac2),var(--ac));border:none;border-radius:6px;padding:6px 11px;color:#fff;cursor:pointer;font-size:14px;flex-shrink:0;}

/* Schedule (row 3, full width) */
.card-sched{grid-column:1/-1;}
.sl-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;padding:5px 7px;min-height:0;}
.sl-list::-webkit-scrollbar{width:3px;}
.sl-list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.appt{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);flex-shrink:0;}
.appt.current{border-color:var(--ac);box-shadow:0 0 9px rgba(0,212,255,.14);}
.appt.done{opacity:.35;}
.appt.missed{border-color:var(--rd);}
.adot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.atm{font-size:11px;color:var(--mt);width:40px;flex-shrink:0;}
.acd{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.atp{font-size:9px;color:var(--mt);flex-shrink:0;}
.ast{font-size:15px;cursor:pointer;flex-shrink:0;transition:transform .15s;}
.ast:hover{transform:scale(1.3);}

.empty{display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:11px;padding:14px;text-align:center;letter-spacing:.05em;}

/* ── MOBILE ── */
@media(max-width:680px){
  html,body{overflow:auto;}
  .app{height:auto;min-height:100vh;grid-template-rows:auto auto auto;overflow:visible;}
  .main{grid-template-columns:1fr;grid-template-rows:auto auto auto auto;overflow:visible;height:auto;}
  .card-nurse{flex-direction:column;height:auto;}
  .nlabel{width:100%;height:auto;padding:7px 12px;border-right:none;border-bottom:1px solid var(--bd);}
  .ndisp{padding:10px 14px;}
  .card{height:auto;min-height:0;}
  .msgs{max-height:180px;}
  .sl-list{max-height:260px;}
  .card-sched{grid-column:1;}
  .nt{font-size:14px;}
  .sv{font-size:14px;}
}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div style="display:flex;align-items:center">
      <div class="logo">DR. LOMANOV</div>
      <div class="clk" id="clk"></div>
    </div>
    <div class="live">LIVE</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="sv" id="sT">—</div><div class="sl">Сьогодні</div></div>
    <div class="stat"><div class="sv" id="sD">—</div><div class="sl">Прийнято</div></div>
    <div class="stat"><div class="sv" id="sL">—</div><div class="sl">Залишилось</div></div>
    <div class="stat"><div class="sv" id="sN">—</div><div class="sl">Наступний</div></div>
  </div>

  <div class="main">

    <!-- Nurse -->
    <div class="card card-nurse">
      <div class="nlabel">Реєстратура</div>
      <div class="ndisp ns-none" id="nd">
        <div class="ni" id="ni">👤</div>
        <div><div class="nt" id="ntx">Пацієнтів немає</div><div class="nsub" id="nsb">Медсестра не відзначилась</div></div>
        <div class="ntm" id="ntm"></div>
      </div>
    </div>

    <!-- My status -->
    <div class="card">
      <div class="clabel">Мій статус</div>
      <div class="sg">
        <button class="sb sf"  data-s="free"   onclick="setS('free')">  <span class="em">🟢</span><span class="lb">Вільний</span></button>
        <button class="sb se"  data-s="ending" onclick="setS('ending')"><span class="em">⚡</span><span class="lb">Закінчую</span></button>
        <button class="sb sbu" data-s="busy"   onclick="setS('busy')">  <span class="em">🔴</span><span class="lb">Зайнятий</span></button>
        <button class="sb sw"  data-s="wait"   onclick="setS('wait')">  <span class="em">⏳</span><span class="lb">Зачекайте</span></button>
        <button class="sb sbr" data-s="break"  onclick="setS('break')"> <span class="em">☕</span><span class="lb">Перерва</span></button>
      </div>
    </div>

    <!-- Chat -->
    <div class="card">
      <div class="clabel">💬 Чат з медсестрою</div>
      <div class="msgs" id="msgs"><div class="empty">Завантаження...</div></div>
      <div class="cq">
        <span class="qp" onclick="qs('Наступний!')">Наступний!</span>
        <span class="qp" onclick="qs('Зачекайте 5 хв')">Зачекайте 5 хв</span>
        <span class="qp" onclick="qs('Запишіть на завтра')">На завтра</span>
        <span class="qp" onclick="qs('☕ Кавус')">☕</span>
        <span class="qp" onclick="qs('Добре 👍')">👍</span>
      </div>
      <div class="crow">
        <input class="cin" id="cin" placeholder="Написати медсестрі..." onkeydown="if(event.key==='Enter')cs()">
        <button class="csb" onclick="cs()">↑</button>
      </div>
    </div>

    <!-- Schedule full width -->
    <div class="card card-sched">
      <div class="clabel">📅 Розклад сьогодні</div>
      <div class="sl-list" id="sl"><div class="empty">Завантаження...</div></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue, push }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const db = getDatabase(initializeApp({
  apiKey:"AIzaSyAg_Cu6fZeviw3EooBd3WB_BzI1PiceshA",
  databaseURL:"https://lomanov-crm-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"lomanov-crm",
  appId:"1:727432965889:web:33825368d0ef0dbb03f500"
}));

const rD=ref(db,'status/doctor'), rN=ref(db,'status/nurse'),
      rC=ref(db,'chat'), rS=ref(db,'schedule/today');

const nCfg={
  none:   {i:'👤',t:'Пацієнтів немає',   s:'Реєстратура вільна',      c:'ns-none'},
  arrived:{i:'🔔',t:'Прийшов пацієнт',   s:'Готує до прийому',        c:'ns-arrived'},
  nervous:{i:'😤',t:'Нервує!',            s:'⚠️ Потрібна ваша увага!', c:'ns-nervous'},
  gone:   {i:'✅',t:'Пішов',             s:'Пацієнт вийшов',          c:'ns-gone'},
};
const dCfg={free:{e:'🟢',l:'Вільний'},ending:{e:'⚡',l:'Закінчую'},busy:{e:'🔴',l:'Зайнятий'},wait:{e:'⏳',l:'Зачекайте'},break:{e:'☕',l:'Перерва'}};
const tC={primary:'#ff4444',repeat:'#44cc88',derm:'#44aaff',removal:'#ffaa00',massage:'#8866ff',inter:'#ff88aa'};
const tL={primary:'Первинний',repeat:'Повторний',derm:'Дерматологія',removal:'Видалення',massage:'Масаж',inter:'Проміжний'};

onValue(rN,snap=>{
  const d=snap.val()||{status:'none'}, c=nCfg[d.status]||nCfg.none, nd=document.getElementById('nd');
  nd.className='ndisp '+c.c;
  document.getElementById('ni').textContent=c.i;
  document.getElementById('ntx').textContent=c.t;
  document.getElementById('nsb').textContent=c.s;
  if(d.timestamp) document.getElementById('ntm').textContent=
    new Date(d.timestamp).toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});
});

onValue(rC,snap=>{
  const msgs=[];
  snap.forEach(c=>msgs.push({id:c.key,...c.val()}));
  const box=document.getElementById('msgs');
  box.innerHTML='';
  if(!msgs.length){box.innerHTML='<div class="empty">Чат порожній</div>';return;}
  msgs.slice(-40).forEach(m=>{
    const me=m.sender==='doctor', el=document.createElement('div');
    el.className='msg '+(me?'me':'her');
    const t=m.timestamp?new Date(m.timestamp).toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'}):'';
    el.innerHTML=`<div class="bbl">${esc(m.text)}</div><div class="mm">${me?'Лікар':'Медсестра'} · ${t}</div>`;
    box.appendChild(el);
  });
  box.scrollTop=box.scrollHeight;
});

onValue(rS,snap=>{
  const d=snap.val(), list=document.getElementById('sl');
  list.innerHTML='';
  if(!d){
    list.innerHTML='<div class="empty">Запустіть syncCalendarToFirebase в Apps Script</div>';
    ['sT','sD','sL'].forEach(id=>document.getElementById(id).textContent='0');
    document.getElementById('sN').textContent='—';
    return;
  }
  const appts=Object.entries(d).map(([id,v])=>({id,...v})).sort((a,b)=>a.time.localeCompare(b.time));
  const now=new Date().toTimeString().slice(0,5);
  let done=0,left=0,nxt=null;
  appts.forEach(a=>{
    const cur=a.status!=='done'&&a.status!=='missed'&&Math.abs(tm(a.time)-tm(now))<25;
    if(a.status==='done') done++; else{left++;if(!nxt)nxt=a.time;}
    const el=document.createElement('div');
    el.className='appt'+(cur?' current':'')+(a.status==='done'?' done':'')+(a.status==='missed'?' missed':'');
    const em={waiting:'⏰',arrived:'🔔',inroom:'🩺',done:'✅',missed:'❌'}[a.status||'waiting']||'⏰';
    el.innerHTML=`<div class="adot" style="background:${tC[a.type]||'#888'}"></div><div class="atm">${a.time}</div><div class="acd">${esc(a.code||a.name||'—')}</div><div class="atp">${tL[a.type]||''}</div><div class="ast" onclick="cyc('${a.id}','${a.status||'waiting'}')">${em}</div>`;
    list.appendChild(el);
  });
  document.getElementById('sT').textContent=appts.length;
  document.getElementById('sD').textContent=done;
  document.getElementById('sL').textContent=left;
  document.getElementById('sN').textContent=nxt||'—';
});

window.setS=s=>{
  document.querySelectorAll('.sb').forEach(b=>b.classList.toggle('active',b.dataset.s===s));
  set(rD,{status:s,emoji:dCfg[s]?.e||'',label:dCfg[s]?.l||s,timestamp:Date.now()});
};
setS('free');

window.cs=()=>{
  const i=document.getElementById('cin'), t=i.value.trim();
  if(!t)return; i.value='';
  push(rC,{sender:'doctor',text:t,timestamp:Date.now()});
};
window.qs=t=>{document.getElementById('cin').value=t;window.cs();};
window.cyc=(id,cur)=>{
  const o=['waiting','arrived','inroom','done','missed'];
  set(ref(db,`schedule/today/${id}/status`),o[(o.indexOf(cur)+1)%o.length]);
};

const tick=()=>{document.getElementById('clk').textContent=' · '+new Date().toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};
tick();setInterval(tick,1000);

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tm(t){const[h,m]=(t||'0:0').split(':').map(Number);return h*60+m;}
</script>
</body>
</html>
